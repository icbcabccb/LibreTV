<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My-TV</title>
    <meta name="description" content="">
    <meta name="keywords" content="">
    <meta name="author" content="">

    <link rel="icon" href="image/logo.png">
    <link rel="apple-touch-icon" href="image/logo-black.png">
    <link rel="manifest" href="manifest.json">
    
    <script src="libs/tailwindcss.min.js"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/index.css">

<style>
    /* 覆盖默认的深色背景，适配图片中的浅色 UI */
    body {
        background-color: #f8f9fa; /* 浅灰白背景 */
        color: #333333;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    
    /* 渐变文字适配浅色背景 */
    .gradient-text {
        background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    /* 搜索框聚焦时的光晕效果 */
    .search-shadow:focus-within {
        box-shadow: 0 0 0 4px rgba(66, 153, 225, 0.2);
    }

    /* 隐藏滚动条但保留功能 */
    .hide-scrollbar::-webkit-scrollbar {
        display: none;
    }
    .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }

    /* 侧边栏样式覆盖 */
    .settings-panel, .history-panel {
        background-color: #ffffff !important;
        border-color: #e5e7eb !important;
        box-shadow: -4px 0 15px rgba(0,0,0,0.05);
    }

    /* 移动端适配 */
    @media (max-width: 640px) {
        .history-panel,
        .settings-panel {
            width: 100vw !important;
            padding: 1rem !important;
        }
        h1.main-title {
            font-size: 2.5rem !important;
        }
        .nav-scroller {
            justify-content: flex-start;
            overflow-x: auto;
            padding-bottom: 5px;
        }
    }
</style>

</head>
<body class="min-h-screen flex flex-col">

    <div class="fixed top-4 left-4 z-20">
        <button onclick="toggleHistory(event)" class="bg-white hover:bg-gray-50 text-gray-600 border border-gray-200 rounded-full p-2 shadow-sm transition-all duration-300" aria-label="观看历史">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
        </button>
    </div>

    <div class="fixed top-4 right-4 z-20">
        <button onclick="toggleSettings(event)" class="bg-white hover:bg-gray-50 text-gray-600 border border-gray-200 rounded-full p-2 shadow-sm transition-all duration-300" aria-label="打开设置">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
        </button>
    </div>
    
    <div id="historyPanel" class="history-panel fixed left-0 top-0 h-full w-80 bg-white border-r border-gray-200 p-6 z-40 transform -translate-x-full transition-transform duration-300" aria-label="观看历史" aria-hidden="true">
        <div class="flex justify-between items-center mb-6 border-b border-gray-100 pb-4">
            <h3 class="text-xl font-bold text-gray-800">观看历史</h3>
            <button onclick="toggleHistory()" class="text-gray-400 hover:text-gray-800 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
        <div id="historyList" class="pb-4 overflow-y-auto h-[calc(100vh-180px)]">
            <div class="text-center text-gray-400 py-8">暂无观看记录</div>
        </div>
        <div class="absolute bottom-0 left-0 w-full p-6 bg-white border-t border-gray-100">
            <button onclick="clearViewingHistory()" class="w-full py-2 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-lg text-sm transition-colors">
                清空历史记录
            </button>
        </div>
    </div>

    <div id="settingsPanel" class="settings-panel fixed right-0 top-0 h-full w-80 bg-white border-l border-gray-200 p-6 z-40 overflow-y-auto shadow-2xl" aria-label="设置面板" aria-hidden="true">
        <div class="flex justify-between items-center mb-6 border-b border-gray-100 pb-4">
            <h3 class="text-xl font-bold text-gray-800">设置</h3>
            <button onclick="toggleSettings()" class="text-gray-400 hover:text-gray-800 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
        <div class="space-y-6">
            <div class="bg-gray-50 rounded-xl p-4">
                <label class="block text-sm font-semibold text-gray-700 mb-3">数据源设置</label>
                <div class="flex space-x-2 mb-3">
                    <button onclick="selectAllAPIs(true)" class="px-2 py-1 bg-white border border-gray-200 hover:bg-gray-100 text-gray-600 text-xs rounded shadow-sm">全选</button>
                    <button onclick="selectAllAPIs(false)" class="px-2 py-1 bg-white border border-gray-200 hover:bg-gray-100 text-gray-600 text-xs rounded shadow-sm">全不选</button>
                    <button onclick="selectAllAPIs(true, true)" class="px-2 py-1 bg-white border border-gray-200 hover:bg-gray-100 text-gray-600 text-xs rounded shadow-sm">全选普通</button>
                </div>
                <div class="max-h-40 overflow-y-auto bg-white border border-gray-200 p-2 rounded-lg mb-2">
                    <div id="apiCheckboxes" class="text-gray-700">
                        </div>
                </div>
                <div class="text-xs text-gray-500 flex justify-between items-center">
                    <span>已选：<span id="selectedApiCount" class="font-medium text-blue-600">0</span></span>
                    <span id="siteStatus"></span>
                </div>
            </div>

            <div class="bg-gray-50 rounded-xl p-4">
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-sm font-semibold text-gray-700">自定义API</label>
                    <button onclick="showAddCustomApiForm()" class="bg-blue-500 hover:bg-blue-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-lg shadow-sm">+</button>
                </div>
                <div id="customApisList" class="max-h-32 overflow-y-auto mb-2 text-gray-600"></div>
                
                <div id="addCustomApiForm" class="hidden mt-2 p-3 bg-white border border-gray-200 rounded-lg shadow-sm">
                    <input type="text" id="customApiName" placeholder="API名称" class="w-full bg-gray-50 border border-gray-200 text-gray-800 px-3 py-2 rounded mb-2 text-sm focus:outline-none focus:border-blue-400">
                    <input type="text" id="customApiUrl" placeholder="https://abc.com" class="w-full bg-gray-50 border border-gray-200 text-gray-800 px-3 py-2 rounded mb-2 text-sm focus:outline-none focus:border-blue-400">
                    <input type="text" id="customApiDetail" placeholder="detail地址（可选）" class="w-full bg-gray-50 border border-gray-200 text-gray-800 px-3 py-2 rounded mb-2 text-sm focus:outline-none focus:border-blue-400">
                    <div class="flex items-center mb-3">
                        <input type="checkbox" id="customApiIsAdult" class="form-checkbox h-4 w-4 text-pink-500 border-gray-300 rounded">
                        <label for="customApiIsAdult" class="ml-2 text-xs text-gray-500">标记为特殊资源</label>
                    </div>
                    <div class="flex space-x-2">
                        <button onclick="addCustomApi()" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white py-1.5 rounded text-xs shadow-sm">添加</button>
                        <button onclick="cancelAddCustomApi()" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-600 py-1.5 rounded text-xs">取消</button>
                    </div>
                </div>
            </div>
            
            <div class="bg-gray-50 rounded-xl p-4">
                <label class="block text-sm font-semibold text-gray-700 mb-3">功能开关</label>
                
                <div class="flex items-center justify-between mb-4">
                    <div>
                        <label class="text-sm font-medium text-gray-700">内容过滤</label>
                        <p class="text-xs text-gray-400">过滤部分不适宜内容</p>
                    </div>
                    <div class="relative inline-block w-11 h-6 align-middle select-none">
                        <input type="checkbox" id="yellowFilterToggle" class="opacity-0 absolute w-full h-full cursor-pointer z-10">
                        <div class="toggle-bg bg-gray-200 w-11 h-6 rounded-full transition-colors duration-200 ease-in-out"></div>
                        <div class="toggle-dot absolute w-5 h-5 bg-white rounded-full top-0.5 left-0.5 shadow transition-transform duration-200 ease-in-out"></div>
                    </div>
                </div>

                <div class="flex items-center justify-between mb-4">
                    <div>
                        <label class="text-sm font-medium text-gray-700">广告过滤</label>
                        <p class="text-xs text-gray-400">分片广告过滤</p>
                    </div>
                    <div class="relative inline-block w-11 h-6 align-middle select-none">
                        <input type="checkbox" id="adFilterToggle" class="opacity-0 absolute w-full h-full cursor-pointer z-10">
                        <div class="toggle-bg bg-gray-200 w-11 h-6 rounded-full transition-colors duration-200 ease-in-out"></div>
                        <div class="toggle-dot absolute w-5 h-5 bg-white rounded-full top-0.5 left-0.5 shadow transition-transform duration-200 ease-in-out"></div>
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div>
                        <label class="text-sm font-medium text-gray-700">豆瓣推荐</label>
                        <p class="text-xs text-gray-400">显示热门影视</p>
                    </div>
                    <div class="relative inline-block w-11 h-6 align-middle select-none">
                        <input type="checkbox" id="doubanToggle" class="opacity-0 absolute w-full h-full cursor-pointer z-10">
                        <div class="toggle-bg bg-gray-200 w-11 h-6 rounded-full transition-colors duration-200 ease-in-out"></div>
                        <div class="toggle-dot absolute w-5 h-5 bg-white rounded-full top-0.5 left-0.5 shadow transition-transform duration-200 ease-in-out"></div>
                    </div>
                </div>
            </div>

            <div class="bg-gray-50 rounded-xl p-4 space-y-2">
                <button onclick="importConfig()" class="w-full py-2 bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 rounded-lg text-sm transition-colors shadow-sm">导入配置</button>
                <button onclick="exportConfig()" class="w-full py-2 bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 rounded-lg text-sm transition-colors shadow-sm">导出配置</button>
                <button onclick="clearLocalStorage()" class="w-full py-2 text-red-500 bg-white border border-gray-200 hover:bg-red-50 rounded-lg text-sm transition-colors shadow-sm">清除缓存</button>
            </div>
        </div>
    </div>

    <div class="container mx-auto px-4 py-8 flex flex-col flex-grow max-w-5xl">
        
        <header class="text-center mt-8 mb-4">
            <div class="flex justify-center items-center mb-2">
                <a href="#" onclick="resetToHome(); return false;" class="flex items-center group">
                    <div class="mr-3 text-blue-500">
                        <svg class="w-10 h-10" fill="currentColor" viewBox="0 0 24 24">
                             <path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 10H3V8h2v5c0 .55.45 1 1 1h12c.55 0 1-.45 1-1V8h2v8zM14 8H10v4h4V8z"/>
                        </svg>
                    </div>
                    <h1 class="main-title text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-cyan-400">My-TV</h1>
                </a>
            </div>
            <p class="text-gray-400 text-sm tracking-widest">搜一搜，打开自由观影体验！</p>
        </header>

        <nav class="flex justify-center mb-8 w-full">
            <div class="nav-scroller flex space-x-6 sm:space-x-8 text-gray-500 font-medium text-base whitespace-nowrap">
                <a href="#" onclick="resetToHome(); return false;" class="text-blue-500 border-b-2 border-blue-500 pb-1 px-1 font-bold">首页</a>
                <a href="#" class="hover:text-gray-800 transition-colors pb-1 px-1">推荐</a>
                <a href="#" onclick="document.getElementById('douban-movie-toggle').click(); return false;" class="hover:text-gray-800 transition-colors pb-1 px-1">电影</a>
                <a href="#" onclick="document.getElementById('douban-tv-toggle').click(); return false;" class="hover:text-gray-800 transition-colors pb-1 px-1">剧集</a>
                <a href="#" class="hover:text-gray-800 transition-colors pb-1 px-1">动漫</a>
                <a href="#" class="hover:text-gray-800 transition-colors pb-1 px-1">综艺</a>
                <a href="#" class="hover:text-gray-800 transition-colors pb-1 px-1">短剧</a>
                <a href="#" class="hover:text-gray-800 transition-colors pb-1 px-1">最近更新</a>
                <a href="#" class="hover:text-gray-800 transition-colors pb-1 px-1">高分榜</a>
            </div>
        </nav>

        <div id="searchArea" class="flex flex-col items-center justify-center w-full mb-8">
            <div class="w-full max-w-2xl relative search-shadow rounded-full transition-shadow duration-300">
                <div class="relative flex items-center">
                    <div class="absolute left-4 text-gray-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                    
                    <input type="text" 
                           id="searchInput" 
                           class="w-full bg-[#f0f5ff] text-gray-700 border-none rounded-full py-3.5 pl-12 pr-28 focus:outline-none focus:ring-0 placeholder-gray-400 text-base" 
                           placeholder="搜索你喜欢的视频..." 
                           autocomplete="off"
                           aria-label="视频搜索框"
                           oninput="toggleClearButton()">
                    
                    <div class="absolute right-1.5 top-1.5 bottom-1.5 flex items-center">
                         <button id="clearSearchInput" 
                                class="hidden text-gray-400 hover:text-gray-600 p-2 mr-1"
                                onclick="clearSearchInput()"
                                aria-label="清空">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                        </button>
                        
                        <button onclick="search()" 
                                class="bg-[#5fb8ff] hover:bg-[#4aa3ee] text-white px-6 h-full rounded-full font-medium shadow-md transition-colors duration-200">
                            搜索
                        </button>
                    </div>
                </div>
            </div>

            <div class="w-full max-w-2xl mt-6 px-2">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-sm font-bold text-gray-600">最近搜索</span>
                    <button onclick="clearSearchHistory();" class="text-xs text-gray-400 hover:text-gray-600 flex items-center transition-colors">
                        清空搜索历史
                    </button>
                </div>
                <div id="recentSearches" class="flex flex-wrap gap-2" aria-label="最近搜索记录">
                    </div>
            </div>
        </div>

        <div id="doubanArea" class="w-full mb-12 hidden">
             <div class="flex justify-between items-center mb-4 px-2">
                 <div class="flex items-center gap-4">
                     <h2 class="text-xl font-bold text-gray-800">热门推荐</h2>
                     <div class="hidden">
                         <button id="douban-movie-toggle">Movies</button>
                         <button id="douban-tv-toggle">TV</button>
                     </div>
                 </div>
                 <button id="douban-refresh" class="text-sm text-blue-500 hover:text-blue-600 flex items-center gap-1">
                     <span>换一批</span>
                     <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                         <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                     </svg>
                 </button>
             </div>
             
             <div id="douban-tags" class="flex flex-wrap gap-2 mb-4 px-2"></div>

             <div id="douban-results" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 px-2">
                 </div>
        </div>

        <div id="resultsArea" class="w-full hidden mb-12">
            <div class="flex justify-between items-center mb-4 px-2">
                <h2 class="text-xl font-bold text-gray-800">搜索结果</h2>
                <div class="text-sm text-gray-500">
                    <span id="searchResultsCount">0</span> 个结果
                </div>
            </div>
            <div id="results" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 px-2">
                </div>
        </div>

    </div>

    <div id="modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center transition-opacity duration-300 z-50">
        <div class="bg-white p-6 rounded-2xl w-11/12 max-w-4xl shadow-2xl max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4 flex-none border-b border-gray-100 pb-2">
                <h2 id="modalTitle" class="text-2xl font-bold text-gray-800 break-words pr-4"></h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-800 text-3xl leading-none">&times;</button>
            </div>
            <div id="modalContent" class="overflow-auto flex-1 min-h-0 py-2">
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
                    </div>
            </div>
        </div>
    </div>

    <div id="passwordModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-[65]">
        <div class="bg-white p-8 rounded-2xl w-11/12 max-w-md shadow-2xl">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">访问验证</h2>
            <p class="text-gray-500 mb-6">请输入密码继续访问</p>
            <form id="passwordForm" onsubmit="handlePasswordSubmit(); return false;">
                <input type="text" style="display:none" autocomplete="username">
                <input type="password" id="passwordInput" class="w-full bg-gray-50 border border-gray-200 text-gray-800 px-4 py-3 rounded-lg focus:outline-none focus:border-blue-500 mb-4 transition-colors" placeholder="输入密码..." autocomplete="new-password">
                <div class="flex space-x-3">
                    <button id="passwordSubmitBtn" type="submit" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white px-4 py-2.5 rounded-lg shadow-md transition-colors">提交</button>
                    <button id="passwordCancelBtn" type="button" onclick="hidePasswordModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2.5 rounded-lg transition-colors">取消</button>
                </div>
            </form>
            <p id="passwordError" class="text-red-500 mt-3 text-sm hidden">密码错误，请重试</p>
        </div>
    </div>

    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 bg-white text-gray-800 px-6 py-3 rounded-full shadow-xl border border-gray-100 transform transition-all duration-300 opacity-0 -translate-y-full z-50 flex items-center gap-2">
        <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <p id="toastMessage" class="font-medium"></p>
    </div>

    <div id="loading" class="fixed inset-0 bg-white/80 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-white p-6 rounded-2xl shadow-xl border border-gray-100 flex items-center space-x-4">
            <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-gray-600 font-medium">加载中...</p>
        </div>
    </div>

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "LibreTV",
        "url": "https://libretv.is-an.org/",
        "description": "免费在线视频搜索与观看平台",
        "potentialAction": {
            "@type": "SearchAction",
            "target": "https://libretv.is-an.org/?s={search_term_string}",
            "query-input": "required name=search_term_string"
        }
    }
    </script>

    <script src="libs/sha256.min.js"></script>
    <script>
        window._jsSha256 = window.sha256;
    </script>
    <script src="js/config.js"></script>
    <script src="js/customer_site.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/douban.js"></script>
    <script src="js/password.js"></script>
    <script src="js/search.js"></script>
    <script src="js/app.js"></script>
    <script src="js/pwa-register.js"></script>

    <script>
        window.__ENV__ = window.__ENV__ || {};
        window.__ENV__.PASSWORD = "{{PASSWORD}}";
        window.__ENV__.ADMINPASSWORD = "{{ADMINPASSWORD}}";
    </script>

    <script src="js/version-check.js"></script>
    <script src="js/index-page.js"></script>
